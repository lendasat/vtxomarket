name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, tag or SHA to checkout."
        required: false
        default: "main"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  INDEXER_IMAGE: ghcr.io/${{ github.repository }}/indexer
  INTROSPECTOR_IMAGE: ghcr.io/${{ github.repository }}/introspector

jobs:
  # ─── Frontend → Cloudflare Pages ──────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_ARK_SERVER_URL: ${{ vars.NEXT_PUBLIC_ARK_SERVER_URL || 'https://mutinynet.arkade.sh' }}
          NEXT_PUBLIC_ESPLORA_URL: ${{ vars.NEXT_PUBLIC_ESPLORA_URL || 'https://mutinynet.com/api' }}
          NEXT_PUBLIC_BOLTZ_URL: ${{ vars.NEXT_PUBLIC_BOLTZ_URL || 'https://api.boltz.mutinynet.arkade.sh' }}
          NEXT_PUBLIC_INDEXER_URL: ${{ vars.NEXT_PUBLIC_INDEXER_URL || 'https://indexer.vtxo.market' }}
          NEXT_PUBLIC_INTROSPECTOR_URL: ${{ vars.NEXT_PUBLIC_INTROSPECTOR_URL || 'https://introspector.vtxo.market' }}
          NEXT_PUBLIC_LENDASWAP_API_URL: ${{ vars.NEXT_PUBLIC_LENDASWAP_API_URL || 'https://api.lendaswap.com/' }}
          NEXT_PUBLIC_LENDASWAP_API_KEY: ${{ secrets.NEXT_PUBLIC_LENDASWAP_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next/ --project-name=vtxomarket

  # ─── Indexer → Docker image (GHCR) ───────────────────────────────
  deploy-indexer:
    name: Build & push indexer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INDEXER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push indexer
        uses: docker/build-push-action@v6
        with:
          context: indexer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Introspector → Docker image (GHCR) ──────────────────────────
  deploy-introspector:
    name: Build & push introspector image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INTROSPECTOR_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push introspector
        uses: docker/build-push-action@v6
        with:
          context: introspector
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
