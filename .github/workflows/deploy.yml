name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, tag or SHA to checkout."
        required: false
        default: "main"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  INDEXER_IMAGE: ghcr.io/${{ github.repository }}/indexer

jobs:
  # ─── Frontend → Cloudflare Pages ──────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          rm -rf src/app/token/\[id\]
          npm run build
          mv out/token.html out/tokenview.html
          rm -rf out/token/ out/token.txt
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_ARK_SERVER_URL: ${{ vars.NEXT_PUBLIC_ARK_SERVER_URL || 'https://mutinynet.arkade.sh' }}
          NEXT_PUBLIC_ESPLORA_URL: ${{ vars.NEXT_PUBLIC_ESPLORA_URL || 'https://mutinynet.com/api' }}
          NEXT_PUBLIC_BOLTZ_URL: ${{ vars.NEXT_PUBLIC_BOLTZ_URL || 'https://api.boltz.mutinynet.arkade.sh' }}
          NEXT_PUBLIC_INDEXER_URL: ${{ vars.NEXT_PUBLIC_INDEXER_URL || 'https://vtxofun-indexer.lendasat.com' }}
          NEXT_PUBLIC_INTROSPECTOR_URL: ${{ vars.NEXT_PUBLIC_INTROSPECTOR_URL || 'https://vtxofun-introspector.lendasat.com' }}
          NEXT_PUBLIC_LENDASWAP_API_URL: ${{ vars.NEXT_PUBLIC_LENDASWAP_API_URL || 'https://api.lendaswap.com/' }}
          NEXT_PUBLIC_LENDASWAP_API_KEY: ${{ secrets.NEXT_PUBLIC_LENDASWAP_API_KEY }}

      - name: Verify build output
        run: ls -la out/ | head -20

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out/ --project-name=vtxomarket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_SIGNET_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Indexer → Docker image (GHCR) ───────────────────────────────
  # Pull and run with:
  #   docker pull ghcr.io/lendasat/vtxomarket/indexer:latest
  #   docker run -p 3001:3001 -v indexer-data:/app/data \
  #     -e ARK_SERVER_URL=https://mutinynet.arkade.sh \
  #     -e NETWORK=mutinynet \
  #     ghcr.io/lendasat/vtxomarket/indexer:latest
  deploy-indexer:
    name: Build & push indexer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INDEXER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push indexer
        uses: docker/build-push-action@v6
        with:
          context: indexer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Introspector ─────────────────────────────────────────────────
  # NOT built here — it's a separate repo (github.com/ArkLabsHQ/introspector)
  # with its own CI/CD that publishes Docker images to GHCR.
  #
  # To run it:
  #   docker pull ghcr.io/arklabshq/introspector:latest
  #   docker run -p 7073:7073 \
  #     -e INTROSPECTOR_SECRET_KEY=$(openssl rand -hex 32) \
  #     -e INTROSPECTOR_NO_TLS=true \
  #     ghcr.io/arklabshq/introspector:latest
